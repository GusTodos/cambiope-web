<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiope - Comunicación Política Estratégica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3a8a;
            --secondary: #dc2626;
            --accent: #3b82f6;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--dark);
            overflow-x: hidden;
        }

        /* Header mejorado */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%);
            color: white;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .teleprompter-btn {
            background: var(--secondary);
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .teleprompter-btn:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        /* Hero Section con imagen de fondo */
        .hero {
            margin-top: 70px;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.95) 0%, rgba(15, 23, 42, 0.9) 100%), 
                        url('https://images.unsplash.com/photo-1540910419868-474947cebacb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            padding: 8rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd"><g fill="%23ffffff" fill-opacity="0.05"><path d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/></g></g></svg>');
            opacity: 0.1;
        }

        .hero-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .hero-badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
        }

        .hero h1 span {
            color: var(--accent);
            display: block;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            max-width: 600px;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        .hero-stats {
            display: flex;
            gap: 3rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cta-button {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 2rem;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(220, 38, 38, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -5px rgba(220, 38, 38, 0.4);
        }

        /* Servicios con imágenes */
        .services {
            padding: 6rem 2rem;
            background: var(--light);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-tag {
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: block;
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .section-subtitle {
            font-size: 1.2rem;
            color: var(--gray);
            max-width: 600px;
            margin: 0 auto;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            position: relative;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.15);
        }

        .service-image {
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .service-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            opacity: 0.2;
        }

        .service-content {
            padding: 2rem;
        }

        .service-number {
            color: var(--accent);
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .service-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--dark);
        }

        .service-description {
            color: var(--gray);
            line-height: 1.6;
        }

        /* Dashboard preview section */
        .dashboard-preview {
            padding: 6rem 2rem;
            background: var(--dark);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .dashboard-grid {
            max-width: 1200px;
            margin: 4rem auto 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
        }

        .dashboard-card h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            opacity: 0.8;
        }

        .metric-value {
            font-weight: 700;
            color: var(--accent);
        }

        /* Sobre nosotros con imagen */
        .about {
            padding: 6rem 2rem;
            background: white;
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .about-image {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.2);
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .about-content h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--dark);
            letter-spacing: -1px;
        }

        .about-content p {
            font-size: 1.1rem;
            color: var(--gray);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .features-list {
            list-style: none;
            margin-top: 2rem;
        }

        .features-list li {
            padding: 1rem 0;
            padding-left: 2.5rem;
            position: relative;
            font-size: 1.1rem;
            color: var(--dark);
        }

        .features-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2rem;
            height: 2rem;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Ubicaciones */
        .locations {
            padding: 6rem 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%);
            color: white;
        }

        .locations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 3rem auto 0;
        }

        .location-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
        }

        .location-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .location-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .location-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .location-type {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        /* CTA Final */
        .cta-section {
            padding: 6rem 2rem;
            background: linear-gradient(135deg, var(--secondary) 0%, #991b1b 100%);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .cta-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.05) 10px,
                rgba(255,255,255,0.05) 20px
            );
            animation: slide 20s linear infinite;
        }

        @keyframes slide {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .cta-section h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .cta-section p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        .cta-button-white {
            display: inline-block;
            background: white;
            color: var(--secondary);
            padding: 1.2rem 3rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        .cta-button-white:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.4);
        }

        /* Footer */
        footer {
            background: var(--dark);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .footer-logo span {
            color: var(--accent);
        }

        .footer-text {
            opacity: 0.7;
            margin-bottom: 2rem;
        }

        .footer-contact {
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .footer-contact a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer-locations {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .copyright {
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0.6;
            font-size: 0.9rem;
        }

        /* TELEPROMPTER STYLES */
        .teleprompter-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            overflow: hidden;
        }

        .teleprompter-overlay.active {
            display: flex;
            flex-direction: column;
        }

        .teleprompter-header {
            background: var(--dark);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }

        .teleprompter-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .teleprompter-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-label {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .control-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: #2563eb;
        }

        .control-btn.secondary {
            background: var(--gray);
        }

        .control-btn.secondary:hover {
            background: #475569;
        }

        .control-btn.danger {
            background: var(--secondary);
        }

        .control-btn.danger:hover {
            background: #b91c1c;
        }

        .speed-control {
            width: 100px;
        }

        .size-control {
            width: 80px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .teleprompter-editor {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .editor-textarea {
            width: 100%;
            max-width: 800px;
            min-height: 300px;
            padding: 2rem;
            font-size: 1.2rem;
            font-family: 'Inter', sans-serif;
            border: 2px solid var(--accent);
            border-radius: 12px;
            resize: vertical;
            background: white;
            color: var(--dark);
            line-height: 1.8;
        }

        .editor-textarea:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .teleprompter-display {
            flex: 1;
            overflow: hidden;
            display: none;
            padding: 4rem 2rem;
            background: black;
        }

        .teleprompter-display.active {
            display: flex;
            justify-content: center;
        }

        .prompter-text {
            color: white;
            font-size: 48px;
            line-height: 1.6;
            text-align: center;
            max-width: 90%;
            overflow-y: auto;
            height: 100%;
            padding: 2rem;
            scrollbar-width: none;
        }

        .prompter-text::-webkit-scrollbar {
            display: none;
        }

        .prompter-text.mirrored {
            transform: scaleX(-1);
        }

        .teleprompter-mode {
            display: flex;
            gap: 0.5rem;
        }

        .mode-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--accent);
            background: transparent;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: var(--accent);
        }

        .mode-btn:hover {
            background: var(--accent);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero-stats {
                gap: 2rem;
            }

            .stat-number {
                font-size: 2rem;
            }

            .services-grid {
                grid-template-columns: 1fr;
            }

            .about-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .teleprompter-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .prompter-text {
                font-size: 32px;
            }
        }

        /* Animaciones */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-content > * {
            animation: fadeInUp 0.8s ease-out backwards;
        }

        .hero-content > *:nth-child(1) { animation-delay: 0.1s; }
        .hero-content > *:nth-child(2) { animation-delay: 0.2s; }
        .hero-content > *:nth-child(3) { animation-delay: 0.3s; }
        .hero-content > *:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">CAMBIO<span>PE</span></div>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#servicios">Servicios</a></li>
                <li><a href="#nosotros">Nosotros</a></li>
                <li><a href="#ubicaciones">Ubicaciones</a></li>
                <li><a href="#contacto">Contacto</a></li>
                <li>
                    <button class="teleprompter-btn" onclick="toggleTeleprompter()">
                        📺 Teleprompter
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <!-- TELEPROMPTER MODAL -->
    <div class="teleprompter-overlay" id="teleprompterOverlay">
        <div class="teleprompter-header">
            <div class="teleprompter-title">
                📺 TELEPROMPTER 2V PROFESIONAL
            </div>
            <div class="teleprompter-controls">
                <div class="control-group">
                    <button class="control-btn" onclick="togglePlayPause()" id="playPauseBtn">
                        ▶️ Iniciar
                    </button>
                    <button class="control-btn secondary" onclick="resetPrompter()">
                        ⏮ Reiniciar
                    </button>
                </div>
                <div class="control-group">
                    <span class="control-label">Velocidad:</span>
                    <input type="range" class="speed-control" id="speedControl" min="1" max="10" value="3">
                    <span id="speedValue">3</span>
                </div>
                <div class="control-group">
                    <span class="control-label">Tamaño:</span>
                    <input type="range" class="size-control" id="sizeControl" min="24" max="120" value="48">
                    <span id="sizeValue">48</span>
                </div>
                <div class="teleprompter-mode">
                    <button class="mode-btn active" onclick="setMode('normal')" id="normalMode">Normal</button>
                    <button class="mode-btn" onclick="setMode('mirror')" id="mirrorMode">Espejo</button>
                </div>
                <button class="control-btn danger" onclick="closeTeleprompter()">
                    ✕ Cerrar
                </button>
            </div>
        </div>
        
        <div class="teleprompter-editor" id="teleprompterEditor">
            <textarea class="editor-textarea" id="scriptText" placeholder="Pega o escribe aquí tu guion...

Ejemplo:
Buenos días a todos. Es un honor estar aquí hoy para hablar sobre el futuro de nuestra nación.

Juntos podemos construir un mañana mejor para todos.</textarea>
            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button class="control-btn" onclick="startPrompter()" style="font-size: 1.1rem; padding: 1rem 2rem;">
                    ▶️ INICIAR TELEPROMPTER
                </button>
                <button class="control-btn secondary" onclick="clearText()" style="font-size: 1.1rem; padding: 1rem 2rem;">
                    🗑️ Limpiar Texto
                </button>
            </div>
        </div>

        <div class="teleprompter-display" id="teleprompterDisplay">
            <div class="prompter-text" id="prompterText"></div>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero" id="inicio">
        <div class="hero-content">
            <span class="hero-badge">📍 Lima · Madrid · Buenos Aires</span>
            <h1>
                LIDERAMOS
                <span>LA NARRATIVA</span>
            </h1>
            <p class="hero-subtitle">
                Comunicación política, estrategia digital y medios para quienes buscan impacto real en la conversación pública.
            </p>
            <a href="#contacto" class="cta-button">Contáctanos →</a>

    <!-- TELEPROMPTER JAVASCRIPT -->
    <script>
        let isPlaying = false;
        let scrollInterval;
        let currentSpeed = 3;
        let isMirrored = false;

        function toggleTeleprompter() {
            const overlay = document.getElementById('teleprompterOverlay');
            overlay.classList.toggle('active');
            document.body.style.overflow = overlay.classList.contains('active') ? 'hidden' : '';
        }

        function closeTeleprompter() {
            stopPrompter();
            document.getElementById('teleprompterOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        function startPrompter() {
            const text = document.getElementById('scriptText').value;
            if (!text.trim()) {
                alert('Por favor, ingresa un texto primero');
                return;
            }

            const display = document.getElementById('teleprompterDisplay');
            const editor = document.getElementById('teleprompterEditor');
            const prompterText = document.getElementById('prompterText');

            prompterText.textContent = text;
            prompterText.scrollTop = 0;
            
            editor.style.display = 'none';
            display.classList.add('active');

            isPlaying = true;
            updatePlayPauseButton();
            startScrolling();
        }

        function togglePlayPause() {
            if (isPlaying) {
                stopPrompter();
            } else {
                startScrolling();
            }
        }

        function startScrolling() {
            isPlaying = true;
            updatePlayPauseButton();
            
            const prompterText = document.getElementById('prompterText');
            const speeds = [0, 0.5, 1, 1.5, 2, 3, 4, 5, 7, 10];
            const speed = speeds[currentSpeed];

            scrollInterval = setInterval(() => {
                prompterText.scrollTop += speed;
                
                if (prompterText.scrollTop + prompterText.clientHeight >= prompterText.scrollHeight) {
                    stopPrompter();
                }
            }, 50);
        }

        function stopPrompter() {
            isPlaying = false;
            updatePlayPauseButton();
            clearInterval(scrollInterval);
        }

        function resetPrompter() {
            stopPrompter();
            const prompterText = document.getElementById('prompterText');
            prompterText.scrollTop = 0;
        }

        function updatePlayPauseButton() {
            const btn = document.getElementById('playPauseBtn');
            if (isPlaying) {
                btn.textContent = '⏸ Pausar';
                btn.classList.add('secondary');
            } else {
                btn.textContent = '▶️ Iniciar';
                btn.classList.remove('secondary');
            }
        }

        function setMode(mode) {
            const prompterText = document.getElementById('prompterText');
            const normalBtn = document.getElementById('normalMode');
            const mirrorBtn = document.getElementById('mirrorMode');

            if (mode === 'mirror') {
                prompterText.classList.add('mirrored');
                mirrorBtn.classList.add('active');
                normalBtn.classList.remove('active');
                isMirrored = true;
            } else {
                prompterText.classList.remove('mirrored');
                normalBtn.classList.add('active');
                mirrorBtn.classList.remove('active');
                isMirrored = false;
            }
        }

        function clearText() {
            if (confirm('¿Estás seguro de que quieres borrar todo el texto?')) {
                document.getElementById('scriptText').value = '';
            }
        }

        // Speed control
        document.getElementById('speedControl').addEventListener('input', function(e) {
            currentSpeed = parseInt(e.target.value);
            document.getElementById('speedValue').textContent = currentSpeed;
            
            if (isPlaying) {
                stopPrompter();
                startScrolling();
            }
        });

        // Size control
        document.getElementById('sizeControl').addEventListener('input', function(e) {
            const size = e.target.value;
            document.getElementById('prompterText').style.fontSize = size + 'px';
            document.getElementById('sizeValue').textContent = size;
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            const overlay = document.getElementById('teleprompterOverlay');
            if (!overlay.classList.contains('active')) return;

            const display = document.getElementById('teleprompterDisplay');
            if (display.classList.contains('active')) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlayPause();
                } else if (e.code === 'ArrowUp') {
                    currentSpeed = Math.min(10, currentSpeed + 1);
                    document.getElementById('speedControl').value = currentSpeed;
                    document.getElementById('speedValue').textContent = currentSpeed;
                    if (isPlaying) {
                        stopPrompter();
                        startScrolling();
                    }
                } else if (e.code === 'ArrowDown') {
                    currentSpeed = Math.max(1, currentSpeed - 1);
                    document.getElementById('speedControl').value = currentSpeed;
                    document.getElementById('speedValue').textContent = currentSpeed;
                    if (isPlaying) {
                        stopPrompter();
                        startScrolling();
                    }
                } else if (e.code === 'Escape') {
                    closeTeleprompter();
                }
            }
        });
    </script>
